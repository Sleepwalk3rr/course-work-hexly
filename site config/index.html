<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon-site.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Трекер</title>

</head>
<body>
<video autoplay muted loop id="bg-video">
  <source src="0330.mp4" type="video/mp4">
  Ваш браузер не поддерживает видео.
</video>
    <div class="main" id="main1">   
    <h1 class="mainText">Трекер чтения книг</h1>
    <input type="text" placeholder="Название книги..." class="inputName" id="input-name">
    <input type="number" placeholder="Кол-во страниц..." class="InputPages" id="input-pages">
    <input type="text" placeholder="Автор..." class="inputAuthor" id="input-author">
    <button class="addButton" id="add-button">Добавить</button>
    </div>

    <h1 class="BookTag">Книги</h1>
    </div>

    <!-- Сюда JS будет добавлять карточки -->
    <div id="container" class="cards-grid"></div>

<div class="stats-outer-container">
    <h1 class="statistic">Статистика</h1>
    <div class="stats-container">
        <div class="stat-card">
            <span class="stat-label">Прочитано книг</span>
            <span class="stat-value" id="finished-count">0</span>
        </div>
        <!-- Другие карточки статов... -->
    </div>
</div>

 




    <script src="script.js" defer></script>
</body>
</html>
